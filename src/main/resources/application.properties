spring.application.name=SpringWork

# WAS Port
server.port = 11000

# MongoDB Connection
spring.data.mongodb.host=43.200.5.164
spring.data.mongodb.port=27017
spring.data.mongodb.database=MyDB
spring.data.mongodb.username=myUser
Spring.data.mongodb.password=1234

# caching log
logging.level.org.springframework.cache=TRACE
logging.level.org.springframework.cache.interceptor=TRACE

# Eureka Server
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

management.server.port:11001
management.server.address=localhost

management.endpoints.web.exposure.include=*

management.endpoint.health.enabled=true
management.endpoint.health.show-details=always
management.endpoint.beans.enabled=true
management.endpoint.info.enabled=true


