<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>메인</title>

    <!-- 외부 폰트 및 스타일 -->
    <link href="/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">

    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        .custom-card {
            max-width: 500px;
            height: 640px;
            margin: auto;
            position: relative;
        }

        .nickname-box {
            background-color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        .user {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding-top: 60px;
        }

        .menu-button {
            width: 90%;
            height: 100px;
            margin: 15px 0;
            font-size: 1.4rem;
            border-radius: 16px;
            font-weight: 500;
            background-color: #f0f0f0;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: none;
            cursor: pointer;
        }

        .menu-button:hover {
            background-color: #e0e0e0;
        }
    </style>
    <script type="text/javascript" src="/js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript">
        var userId = sessionStorage.getItem('userId');
        // HTML로딩이 완료되고, 실행됨
        $(document).ready(function () {

            // JWT 토큰이 존재하는지 확인하여 로그인 상태를 확인
            const jwtToken = localStorage.getItem("jwtToken");
            if (jwtToken) {
                // 토큰이 존재하면 서버에 유효성 검증 요청을 보내거나 토큰에서 정보를 추출하여 사용자 ID를 표시
                // 여기서는 단순화하여 로그인 상태만 확인하고 환영 메시지를 표시합니다.
                // 실제 구현에서는 서버의 보호된 API를 호출하여 사용자 정보를 가져오는 것이 좋습니다.
                $("#nicknameBox").text("환영합니다!");
            } else {
                // 토큰이 없으면 로그인 페이지로 리다이렉트
                location.href = "/login.html";
            }
            // 사용자 아이디 표시
            $("#nicknameBox").text("로그인한 사용자 ID: " + userId);

            // 내정보
            $("#myaccount").on("click", function () {  // 버튼 클릭했을때, 발생되는 이벤트 생성함(onclick 이벤트와 동일함)
                location.href = "/main/myaccount";
            });

            // 배송조회
            $("#delivery").on("click", function () {  // 버튼 클릭했을때, 발생되는 이벤트 생성함(onclick 이벤트와 동일함)
                location.href = "/main/post/deliverytracking";
            });

            // 저장된 배송조회
            $("#postList").on("click", function () {  // 버튼 클릭했을때, 발생되는 이벤트 생성함(onclick 이벤트와 동일함)
                location.href = "/main/post/postList";
            });

            // 공지사항
            $("#announcement").on("click", function () {  // 버튼 클릭했을때, 발생되는 이벤트 생성함(onclick 이벤트와 동일함)
                location.href = "/main/notice/noticeList";
            });

        })
    </script>
</head>
<body class="bg-gradient-primary">

<div class="container">
    <div class="card o-hidden border-0 shadow-lg my-5 custom-card">
        <!-- 닉네임 우측 상단 -->
        <div class="nickname-box" id="nicknameBox"></div>

        <div class="user">
            <button id="myaccount" class="menu-button">내정보</button>
            <button id="delivery" class="menu-button">배송조회</button>
            <button id="postList" class="menu-button">내 저장된 배송조회</button>
            <button id="announcement" class="menu-button">공지사항</button>
        </div>
    </div>
</div>

<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
