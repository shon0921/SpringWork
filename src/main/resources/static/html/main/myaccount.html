<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

  <title>내 정보</title>

  <!-- Custom fonts -->
  <link href="/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet" />

  <!-- Custom styles -->
  <link href="/css/sb-admin-2.min.css" rel="stylesheet" />

  <style>
    .custom-card {
      max-width: 500px;
      height: 640px;
      margin: auto;
      background-color: white;
      border-radius: 12px;
      padding: 40px 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .user {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* 반응형 폰트 크기 */
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 30px;
      color: #000;
    }

    .info-text {
      width: 100%;
      background-color: #f8f9fc;
      padding: 15px;
      margin: 10px 0;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 500;
      color: #000;
      text-align: center;
      border-radius: 8px;
    }

    .info-text h2,
    .info-text h3 {
      font-size: inherit;
      font-weight: inherit;
      color: inherit;
      margin: 0;
    }

    /* 반응형 버튼 */
    .menu-button {
      font-size: clamp(1rem, 2vw, 1.3rem);
      height: clamp(45px, 5vw, 65px);
      width: 100%;
      max-width: 500px;
      margin: 10px 0;
      border-radius: 12px;
      font-weight: 500;
      background-color: #e0e0e0;
      color: #000;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .menu-button:hover {
      background-color: #d0d0d0;
    }

    .menu-button.red {
      background-color: #e57373;
      color: white;
    }

    .menu-button.red:hover {
      background-color: #d32f2f;
    }

    #backButton {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-size: 1.5rem;
      color: #858796;
    }

    #backButton:hover {
      color: #5a5c69;
    }
  </style>

  <script type="text/javascript" src="/js/jquery-3.6.0.min.js"></script>
  <script type="text/javascript">
    var userId = sessionStorage.getItem('userId');
    var regDt = sessionStorage.getItem('regDt');

    $(document).ready(function () {

      $("#backButton").on("click", function () {
        location.href = "/main/title";
      });

      // 사용자 아이디 표시
      $("h2").text("로그인한 사용자 ID: " + userId);
      $("h3").text("가입일: " + regDt);

      // 비밀번호 변경
      $("#changepassword").on("click", function () {
        location.href = "/main/changepassword";
      });

      // 문의하기
      $("#inquiry").on("click", function () {
        location.href = "/main/inquiry/inquiryList";
      });

      // 회원탈퇴
      $("#delete").on("click", function () {
        location.href = "/main/accountdelete";
      });

      $("#logout").on("click", function () {
        if (confirm("로그아웃 하시겠습니까?")) {
          logout();
        }

        function logout() {
          $.ajax({
            url: "/user/logout",
            type: "post",
            contentType: "application/json",
            dataType: "json",
          }).then(function (json) {
            alert(json.msg);
            if (json.result === 1) {
              sessionStorage.clear();
              location.href = "/";
            }
          });
        }
      });
    });
  </script>
</head>

<body class="bg-gradient-primary">
<div class="container">
  <div class="card o-hidden border-0 shadow-lg my-5 custom-card">
    <button type="button" id="backButton">
      <i class="fas fa-chevron-left"></i>
    </button>
    <div class="user">
      <h1>내정보</h1>

      <div class="info-text"><h2></h2></div>
      <div class="info-text"><h3></h3></div>

      <button id="changepassword" type="button" class="menu-button">비밀번호 변경</button>
      <button id="inquiry" type="button" class="menu-button">문의하기</button>
      <button id="logout" type="button" class="menu-button">로그아웃</button>
      <button id="delete" type="button" class="menu-button red">회원탈퇴</button>
    </div>
  </div>
</div>

<!-- Bootstrap core JavaScript -->
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/vendor/fontawesome-free/js/all.min.js"></script>
</body>

</html>
