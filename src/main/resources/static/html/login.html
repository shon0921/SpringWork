<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>로그인</title>

    <!-- 부트스트랩 CSS -->
    <link href="/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css" />
    <link
            href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
            rel="stylesheet"
    />
    <link href="/css/sb-admin-2.min.css" rel="stylesheet" />

    <style>
        /* --- 뒤로가기 버튼 스타일 (수정됨) --- */
        #backButton {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-size: 1.5rem;
            color: #858796;
        }

        #backButton:hover {
            color: #5a5c69;
        }
        /* --- 여기까지 수정됨 --- */

        .custom-card {
            width: 100%;
            max-width: 500px;
            height: 640px;
            margin: auto;
            position: relative;
            /* --- [핵심 수정] Flexbox 대신 padding-top으로 수동 조절 --- */
            padding-top: 20px; /* 이 값을 조절하여 위치를 맞추세요 (예: 60px, 100px 등) */
            box-sizing: border-box; /* padding을 추가해도 카드 전체 크기가 유지되도록 설정 */
        }

        .custom-card .p-5 {
            padding: 2rem !important;
        }

        .user button {
            margin-top: 50px;
            padding: 14px 0;
            font-size: 1.2rem;
            height: 60px;
        }

        .user button:first-of-type {
            margin-top: 30px;
        }

        .user button:last-of-type {
            margin-top: 30px;
        }
    </style>

    <script src="/js/jquery-3.6.0.min.js"></script>
    <script src="/js/jquery.serializeObject.min.js"></script>

    <script>
        $(document).ready(function () {
            // 뒤로가기 버튼 클릭 이벤트
            $("#backButton").on("click", function () {
                location.href = "/";
            });

            // 닫기 버튼 클릭 시 에러 메시지 숨기기
            $("#loginErrorMsg .btn-close").on("click", function () {
                $("#loginErrorMsg").hide();
            });

            // 비밀번호 찾기 버튼
            $("#bthSearchPassword").on("click", function () {
                location.href = "/forgotpassword";
            });

            // 로그인 버튼
            $("#bthLogin").on("click", function () {
                let f = document.getElementById("f");

                $("#loginErrorMsg").hide();

                if (f.userId.value === "") {
                    alert("아이디를 입력하세요.");
                    f.userId.focus();
                    return;
                }

                if (f.password.value === "") {
                    alert("비밀번호를 입력하세요.");
                    f.password.focus();
                    return;
                }

                $.ajax({
                    url: "/api/auth/login", // 이 부분을 수정했습니다.
                    type: "post",
                    contentType: "application/json",
                    dataType: "JSON",
                    data: JSON.stringify($("#f").serializeObject()),
                }).then(
                    function (response) {
                        if (response.data && response.data.result === 1 && response.data.token) {
                            // JWT 토큰을 localStorage에 저장
                            localStorage.setItem("jwtToken", response.data.token);
                            alert("로그인 성공");
                            location.href = "/main/title";
                        } else {
                            // 서버로부터 예상치 못한 응답을 받은 경우
                            $("#loginErrorText").text("로그인 실패: 유효하지 않은 응답");
                            $("#loginErrorMsg").show();
                        }
                    },
                    function (xhr) {
                        // 로그인 실패 시 서버에서 보낸 에러 메시지를 표시
                        let errorMsg = "로그인 실패";
                        if (xhr.responseJSON && xhr.responseJSON.msg) {
                            errorMsg = xhr.responseJSON.msg;
                        }
                        $("#loginErrorText").text(errorMsg);
                        $("#loginErrorMsg").show();
                    }
                );
            });
        });
    </script>
</head>

<body class="bg-gradient-primary">

<div class="container">
    <div class="card o-hidden border-0 shadow-lg my-5 custom-card">
        <!-- --- 뒤로가기 버튼 HTML (수정됨) --- -->
        <button type="button" id="backButton">
            <i class="fas fa-chevron-left"></i>
        </button>
        <!-- --- 여기까지 수정됨 --- -->

        <div class="col-lg-0">
            <div class="p-5">
                <div class="text-center">
                    <h1 class="h4 text-gray-900 mb-4">로그인</h1>
                </div>
                <form class="user" id="f">
                    <div class="form-group">
                        <label for="userId">아이디</label>
                        <input type="text" class="form-control form-control-user" name="userId" id="userId"/>
                    </div>
                    <div class="form-group">
                        <label for="password">비밀번호</label>
                        <input type="password" class="form-control form-control-user" name="password" id="password" />
                    </div>
                    <button id="bthLogin" type="button" class="btn btn-primary btn-user btn-block">로그인</button>
                    <button id="bthSearchPassword" type="button" class="btn btn-primary btn-user btn-block">비밀번호 찾기</button>
                </form>

                <div
                        id="loginErrorMsg"
                        class="alert alert-danger alert-dismissible fade show mt-3"
                        role="alert"
                        style="display: none"
                >
                    <strong>오류!</strong> <span id="loginErrorText"></span>
                    <button
                            type="button"
                            class="btn-close"
                            aria-label="Close"
                    ></button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap core JavaScript -->
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

<!-- Custom scripts for all pages -->
<script src="/js/sb-admin-2.min.js"></script>
</body>
</html>
